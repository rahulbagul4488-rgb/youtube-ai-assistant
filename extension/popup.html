<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube AI Assistant</title>
  <style>
    /* ── Reset ───────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 390px;
      min-height: 540px;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #0f0f0f;
      color: #f1f1f1;
      display: flex;
      flex-direction: column;
      font-size: 13px;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    header {
      background: linear-gradient(135deg, #cc0000, #ff0000);
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .header-logo { font-size: 22px; }
    .header-text h1 { font-size: 14px; font-weight: 700; }
    .header-text p  { font-size: 11px; opacity: .8; margin-top: 1px; }

    /* ── Status ──────────────────────────────────────────────────── */
    #status-bar {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 7px 14px;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }
    #status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #555; flex-shrink: 0;
      transition: background .3s;
    }
    #status-dot.green  { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    #status-dot.yellow { background: #f59e0b; box-shadow: 0 0 6px #f59e0b88; }
    #status-dot.red    { background: #ef4444; }
    #status-text { font-size: 12px; color: #aaa; }

    /* ── Ingest section ──────────────────────────────────────────── */
    #ingest-section {
      padding: 10px 14px;
      border-bottom: 1px solid #1e1e1e;
      flex-shrink: 0;
    }
    #btn-ingest {
      width: 100%;
      padding: 9px 12px;
      background: #cc0000;
      color: #fff;
      border: none;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s, opacity .2s, transform .1s;
    }
    #btn-ingest:hover:not(:disabled) { background: #e00000; transform: translateY(-1px); }
    #btn-ingest:active:not(:disabled) { transform: translateY(0); }
    #btn-ingest:disabled { opacity: .45; cursor: not-allowed; }

    /* ── Messages ────────────────────────────────────────────────── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 14px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 220px;
    }
    #chat-messages::-webkit-scrollbar { width: 4px; }
    #chat-messages::-webkit-scrollbar-track { background: transparent; }
    #chat-messages::-webkit-scrollbar-thumb { background: #333; border-radius: 4px; }

    .msg {
      max-width: 86%;
      padding: 9px 13px;
      border-radius: 14px;
      line-height: 1.55;
      word-break: break-word;
      animation: pop .18s ease;
    }
    @keyframes pop {
      from { opacity: 0; transform: translateY(5px) scale(.97); }
      to   { opacity: 1; transform: none; }
    }
    .msg.user {
      align-self: flex-end;
      background: #cc0000;
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.assistant {
      align-self: flex-start;
      background: #1e1e1e;
      color: #e0e0e0;
      border: 1px solid #2e2e2e;
      border-bottom-left-radius: 4px;
    }
    .msg.system {
      align-self: center;
      background: transparent;
      color: #555;
      font-size: 11px;
      text-align: center;
      border: none;
      padding: 4px 0;
    }

    /* Typing indicator */
    .typing { display: flex; align-items: center; gap: 5px; padding: 10px 14px; }
    .typing span {
      display: block; width: 7px; height: 7px; border-radius: 50%;
      background: #555; animation: blink 1.2s infinite;
    }
    .typing span:nth-child(2) { animation-delay: .2s; }
    .typing span:nth-child(3) { animation-delay: .4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

    /* ── Input row ───────────────────────────────────────────────── */
    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 14px 14px;
      border-top: 1px solid #1e1e1e;
      flex-shrink: 0;
    }
    #question-input {
      flex: 1;
      background: #1a1a1a;
      border: 1px solid #2e2e2e;
      border-radius: 9px;
      color: #f1f1f1;
      font-size: 13px;
      padding: 9px 12px;
      resize: none;
      min-height: 40px;
      max-height: 100px;
      outline: none;
      transition: border-color .2s;
      font-family: inherit;
    }
    #question-input:focus       { border-color: #cc0000; }
    #question-input::placeholder{ color: #555; }

    #btn-send {
      background: #cc0000;
      border: none;
      border-radius: 9px;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0;
      transition: background .2s, opacity .2s;
    }
    #btn-send:hover:not(:disabled)  { background: #e00000; }
    #btn-send:disabled { opacity: .35; cursor: not-allowed; }
    #btn-send svg { pointer-events: none; }
  </style>
</head>
<body>

<!-- Header -->
<header>
  <div class="header-logo">▶️</div>
  <div class="header-text">
    <h1>YouTube AI Assistant</h1>
    <p>Open-source · HuggingFace · RAG</p>
  </div>
</header>

<!-- Status -->
<div id="status-bar">
  <div id="status-dot"></div>
  <span id="status-text">Detecting video…</span>
</div>

<!-- Ingest -->
<div id="ingest-section">
  <button id="btn-ingest" disabled>⚡ Index This Video</button>
</div>

<!-- Messages -->
<div id="chat-messages">
  <div class="msg system">Index a video, then ask anything about it.</div>
</div>

<!-- Input -->
<div id="input-row">
  <textarea
    id="question-input"
    placeholder="Ask something about this video…"
    rows="1"
    disabled
  ></textarea>
  <button id="btn-send" disabled>
    <svg width="18" height="18" viewBox="0 0 24 24" fill="white">
      <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
    </svg>
  </button>
</div>

<script src="popup.js"></script>
</body>
</html>
